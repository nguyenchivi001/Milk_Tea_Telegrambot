spring.application.name=milkteabot

# Configured via environment variables (TELEGRAM_TOKEN, TELEGRAM_USERNAME, OWNER_CHAT_ID)
# The token below has been revoked and must not be used
# telegram.bot.token=8650748992:AAF7SdTN4MJBvVv77TtKQ-dB0XA6Rdsifwg
telegram.bot.token=${TELEGRAM_TOKEN}
telegram.bot.username=${TELEGRAM_USERNAME}
telegram.owner.chatid=${OWNER_CHAT_ID}

# H2 Database
spring.datasource.url=jdbc:h2:file:/app/data/milkteadb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Log
logging.level.org.telegram=WARN
